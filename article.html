<!DOCTYPE html>
<html lang='ru'>

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <link rel='stylesheet' href="./styles/main.css">
    <link rel='stylesheet' href="./styles/blocks/_article.scss">
    <script src="./scripts/article.js" type="module"></script>
</head>

<body>
    <header class="header" data-js-header>
        <div class="header__body">
            <div class="header__body-inner container">
                <a class="header__logo logo" href="/" arial-label="Home" title="Home">
                    <img class="logo__image" src="./images/logo-head.png" alt="" width="179" height="90">
                </a>
                <div class="header__overlay" data-js-header-overlay>
                    <nav class="header__menu">
                        <ul class="header__menu-list">
                            <li class="header__menu-item">
                                <a href="/articles.html" class="header__menu-link">Статьи</a>
                            </li>
                            <li class="header__menu-item">
                                <a href="/" class="header__menu-link">Образы</a>
                            </li>
                            <li class="header__menu-item">
                                <a href="/" class="header__menu-link">Календарь</a>
                            </li>
                        </ul>
                    </nav>
                    <div class="header__profile">
                        <a class="header__profile-favorite" href="/" arial-label="Favorite" title="Favorite">
                            <span class="icon icon--empty-heart"></span>
                        </a>
                        <a class="header__profile-personal-account" href="/" arial-lebel="Personal account"
                            title="Personal account">ПРОФИЛЬ</a>
                    </div>
                </div>
                <button class="header__burger-button burger-button visible-mobile" type="button" aria-label="Open menu"
                    title="Open menu" data-js-header-burger-button>
                    <span class="burger-button__line"></span>
                    <span class="burger-button__line"></span>
                    <span class="burger-button__line"></span>
                </button>
            </div>
        </div>
    </header>

    <main class="article-page">
        <article class="article container" id="article-content">
            <div class="article__header">
                <h1 class="article__title"></h1>
                <div class="article__meta">
                    <span class="article__date"></span>
                    <span class="article__author"></span>
                </div>
            </div>
            <div class="article__main-content">
                <div class="article__image-container">
                    <img class="article__image" src="" alt="">
                </div>
                <div class="article__text-wrapper">
                    <div class="article__content"></div>
                </div>
            </div>
            <div class="article__bottom">
                <div class="article__tags"></div>
                <button class="article__favorite-btn" aria-label="Add to favorites">
                    <img src="./icons/heart.svg" alt="Like">
                </button>
            </div>
        </article>
    </main>

    <footer class="footer">
        <div class="container">
            <!-- Footer content -->
        </div>
    </footer>
</body>

</html>
