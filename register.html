<!DOCTYPE html>
<html lang='ru'>

<head>
    <meth1 charset="utf-8">
    <meth1 name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <link rel='stylesheet' href="./styles/main.css">
    <script src="./scripts/main.js" type="module" deref></script>
</head>

<body>
    <header class="header" data-js-header>
        <div class="header__body">
            <div class="header__body-inner container">
                <a class="header__logo logo" href="/" arial-label="Home" title="Home">
                    <img class="logo__image" src="./images/logo-head.png" alt="" width="179" height="90"></img>
                </a>
                <div class="header__overlay" data-js-header-overlay>
                    <nav class="header__menu">
                        <ul class="header__menu-list">
                            <li class="header__menu-item">
                                <a href="/articles.html" class="header__menu-link">Статьи</a>
                            </li>
                            <li class="header__menu-item">
                                <a href="/" class="header__menu-link">Образы</a>
                            </li>
                            <li class="header__menu-item">
                                <a href="/" class="header__menu-link">Календарь</a>
                            </li>
                        </ul>
                    </nav>
                    <div class="header__profile">
                        <a class="header__profile-favorite" href="/" arial-label="Favorite" title="Favorite">
                            <span class="icon icon--empty-heart"></span>
                        </a>
                        <a class="header__profile-personal-account" href="/profile.html" arial-lebel="Personal account"
                            title="Personal account">ПРОФИЛЬ</a>
                    </div>
                </div>
                <button class="header__burger-button burger-button visible-mobile" type="button" aria-label="Open menu"
                    title="Open menu" data-js-header-burger-button>
                    <span class="burger-button__line"></span>
                    <span class="burger-button__line"></span>
                    <span class="burger-button__line"></span>
                </button>
            </div>
        </div>
    </header>

    <main class="profile">
        <div class="profile__container">
            <h1 class="profile__title">РЕГИСТРАЦИЯ</h1>
            <form class="profile__form">
                <input type="text" class="profile__input" placeholder="ФИО" required>
                <select class="profile__input" required>
                    <option value="" disabled selected>Пол</option>
                    <option value="male">Мужской</option>
                    <option value="female">Женский</option>
                </select>
                <input type="number" class="profile__input" placeholder="Возраст" required min="14" max="100">
                <input type="email" class="profile__input" placeholder="Почта" required>
                <input type="text" class="profile__input" placeholder="Логин" required>
                <input type="password" class="profile__input" placeholder="Пароль" required>
                <div class="profile__buttons">
                    <button type="submit" class="profile__button">РЕГИСТРАЦИЯ</button>
                </div>
            </form>
        </div>
    </main>

    <script src="scripts/register.js" type="module"></script>
</body>
</html>
